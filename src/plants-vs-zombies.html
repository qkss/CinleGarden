<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馨乐花园保卫战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #2d1b3d;
    font-family: "Comic Sans MS", "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; color: #fff;
  }
  #wrap { position: relative; box-shadow: 0 20px 60px rgba(0,0,0,.6); border-radius: 12px; overflow: hidden; max-width: 100vw; max-height: 100vh; }
  canvas { display: block; background: #000; cursor: pointer; max-width: 100vw; max-height: 100vh; }
  /* 手机/平板全屏时铺满并等比缩放 */
  #wrap:fullscreen, #wrap:-webkit-full-screen {
    width: 100vw; height: 100vh; border-radius: 0; background: #2d1b3d;
    display: flex; align-items: center; justify-content: center;
  }
  #wrap:fullscreen canvas, #wrap:-webkit-full-screen canvas { max-width: 100vw; max-height: 100vh; }
  /* 竖屏手机/平板提示横屏(iOS 无法程序锁定方向时的兜底) */
  #rotateHint { display: none; }
  @media (orientation: portrait) and (pointer: coarse) {
    #rotateHint {
      display: flex; position: fixed; inset: 0; z-index: 9999;
      background: #2d1b3d; color: #fff; align-items: center; justify-content: center;
      text-align: center; font-size: 28px; line-height: 1.8; font-weight: bold; padding: 24px;
    }
  }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; background: rgba(20,10,30,.9);
    text-align: center; gap: 14px; backdrop-filter: blur(3px); padding: 28px 24px;
    overflow-y: auto;            /* scroll when the guide is taller than the canvas */
  }
  #overlay > * { flex-shrink: 0; }
  /* auto-center vertically only when content fits, else allow scroll from top */
  #overlay::before, #overlay::after { content: ""; margin: auto; }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 40px; text-shadow: 3px 3px 0 #000; letter-spacing: 2px; margin-top: 4px; }
  #overlay p { font-size: 16px; max-width: 640px; line-height: 1.7; opacity: .92; }
  .btn {
    background: linear-gradient(#7ed957,#4a9e2f); border: 3px solid #2f6b1c; border-radius: 14px;
    padding: 12px 34px; font-size: 22px; font-weight: bold; color: #fff;
    cursor: pointer; text-shadow: 1px 1px 0 #2f6b1c; box-shadow: 0 5px 0 #2f6b1c;
    transition: transform .08s; font-family: inherit;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #2f6b1c; }
  .small { font-size: 13px; opacity: .75; }
  .legend { font-size: 14px; opacity: .9; max-width: 720px; line-height: 1.9; text-align: left; }
  .btn2 { background: linear-gradient(#5aa0e0,#3a6fb0); border-color:#274d80; box-shadow:0 5px 0 #274d80; text-shadow:1px 1px 0 #274d80; }
  .btn2:active { box-shadow:0 1px 0 #274d80; }
  .author { font-size: 13px; opacity: .7; margin-top: 6px; letter-spacing: 1px; }
  .menuRow { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
  #overlay h1.big { font-size: 52px; }
</style>
</head>
<body><div id="wrap">
  <canvas id="game" width="1120" height="640"></canvas>
  <div id="overlay"></div>
</div>
  <div id="rotateHint">🔄<br>请把手机横屏游戏</div>
<script>
(() => {
  "use strict";
  /* ===== core ===== */
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");

  // 开始界面攻略内容(点"查看攻略"展开)
  const GUIDE_HTML = `
    <p>顶部点击卡片选植物（或按快捷键 <b>1-9 0 - + =</b> 依次对应各卡），再点击草坪格子种下。点击阳光收集，或按 <b>空格</b>一键拾取全部阳光 ☀️。<b>~</b> 键或右上角 <b>🛠️铲子</b>（或右键）铲除植物以便更换。</p>
    <div class="legend">
      🌻 <b>向日葵</b> 产阳光 · 🟢 <b>豌豆射手</b> 基础输出 · ❄️ <b>寒冰射手</b> 投掷冰冻·可升级延长冻结(15波解锁) ·
      🔁 <b>双发射手</b> 双倍火力 · 🌿 <b>三豆射手</b> 连发3颗(10波解锁) · 🌵 <b>仙人掌</b> 穿透尖刺(贯穿整行·后方有僵尸会向后射击) · 🌵 <b>巨仙掌</b> 穿透尖刺·可打空中·克制气球(10波解锁) · 🔥 <b>篝火</b> 豌豆附魔火焰·穿铁门(10波解锁) ·
      🟤 <b>坚果墙</b> 肉盾 · 🥔 <b>土豆盾</b> 超级肉盾·可升级·摧毁爆炸(5级留土豆泥减速) ·
      🌶️ <b>辣椒</b> 烧光一整横排(20波解锁) · 🍒 <b>樱桃炸弹</b> 范围秒杀 · 💣 <b>土豆地雷</b> 埋雷炸一只<br>
      敌人(护甲会先被打掉再变普通)：普通 / 🚧 路障 / 🪣 铁桶 / 🛡️ 钢盔铁甲 /
      🦘 撑杆(快·跳过第一株) / 🏈 橄榄球 / 🦣 巨人(一拳碎植物·死亡爆炸) /
      🕷️ 空降蜘蛛(偷植物·只落右侧4列) / 🎈 气球(飞行·需仙人掌/炸弹) / 🚪 铁门(挡豌豆·用火焰/爆炸破)<br>
      <b>Boss</b>：🌀 鸣人(100波后·能量极光穿透整行·高血高伤) / 🧙 女巫(80波后·每5秒给周围僵尸+500%血2秒)<br>
      <b>终极技能</b>：🌻终极向日葵(攻速流·100波后)每20秒给本行2秒无敌护盾 / 🌻终极向日葵(血量流)每10秒给本行植物回血20% · ❄️终极寒冰(Lv5)每20秒全屏冰霜雪雨冻结全场3秒(100波后)<br>
      🛒 每行左侧有<b>小推车</b>：僵尸到底线自动冲出清空整行，但<b>每行仅一次</b>！
    </div>
    <p>🔁 <b>无尽模式</b>：波数越高越难，每 5 波是<b>巨潮</b>(强力僵尸带队)。尽量活久、拿高分！<br>
       右下角：<b>重开</b> / <b>暂停</b>(P) / <b>快进 1x/2x/3x</b>(F)。最高分自动记录到本机排行榜(前 10)。<br>
       🧪 <b>Shift+0</b> 加 10000 阳光；按住 <b>Alt</b> 查看所有植物属性。</p>
    <p style="font-size:14px">🌻 <b>第 5 波后点击向日葵升级</b>，二选一分支(各级 250 阳光，5 级)：⚡攻速(满级本行攻速翻倍) 或 🛡血量(每级 +50% 本行血量)；
       Lv5 后合流 → Lv6 钢化(1000，本行+100%血) → Lv7 终极(1500，全场CD−50%·产阳光×10)。
       🥔 土豆盾 / ❄️ 寒冰 也可点击升级。</p>`;

  function showMenu(){
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      `<h1 class="big">🌻 馨乐花园保卫战 🧟</h1>
       <div class="menuRow">
         <button class="btn" id="startBtn">开始游戏</button>
         <button class="btn btn2" id="guideBtn">查看攻略</button>
       </div>
       <div class="author">作者 Niko</div>`;
    document.getElementById("startBtn").onclick = startGame;
    document.getElementById("guideBtn").onclick = showGuide;
  }
  function showGuide(){
    overlay.innerHTML =
      `<h1>📖 游戏攻略</h1>${GUIDE_HTML}
       <button class="btn" id="guideBackBtn">返回</button>
       <div class="author">作者 Niko</div>`;
    document.getElementById("guideBackBtn").onclick = showMenu;
  }
  /* ===== config ===== */
  // ---------- Layout ----------
  const COLS = 9, ROWS = 5;
  const GRID = { x: 60, y: 130, cw: 96, ch: 92 };
  const TOPBAR_H = 100;
  const W = canvas.width, H = canvas.height;
  const SHOVEL = { x: 128, y: 16, w: 58, h: 70 };          // 铲子放最左(紧挨阳光计数)
  const CARD_X0 = 194, CARD_W = 60, CARD_STRIDE = 67, CARD_Y = 14, CARD_H = 74;
  // 卡片快捷键: 1-9, 0, -, +, = (依次对应 13 张卡); 铲子: ~
  const HOTKEYS = ["1","2","3","4","5","6","7","8","9","0","-","+","="];
  const HOTKEY_LABEL = ["1","2","3","4","5","6","7","8","9","0","-","+","="];

  const cellX = c => GRID.x + c * GRID.cw;
  const cellY = r => GRID.y + r * GRID.ch;
  const cellCenterX = c => cellX(c) + GRID.cw/2;
  const cellCenterY = r => cellY(r) + GRID.ch/2;
  const colAtX = px => { const c = Math.floor((px - GRID.x)/GRID.cw); return (c>=0&&c<COLS)?c:-1; };
  const rowAtY = py => { const r = Math.floor((py - GRID.y)/GRID.ch); return (r>=0&&r<ROWS)?r:-1; };

  // ---------- Plant definitions ----------
  const PLANTS = {
    sunflower: { name:"向日葵", cost:50,  cooldown:5,  hp:60,  kind:"producer", color:"#ffd23f" },
    peashooter:{ name:"豌豆",  cost:100, cooldown:5,  hp:60,  kind:"shooter",  color:"#5cb85c", dmg:25, rate:1.2, shots:1 },
    snowpea:   { name:"寒冰",  cost:175, cooldown:8,  hp:60,  kind:"shooter",  color:"#4fb6e0", dmg:25, rate:2.6, shots:1, freeze:true, unlock:15 },
    repeater:  { name:"双发",  cost:200, cooldown:10, hp:60,  kind:"shooter",  color:"#3f9e3f", dmg:25, rate:1.3, shots:2 },
    threepeater:{name:"三豆",  cost:325, cooldown:12, hp:60,  kind:"shooter",  color:"#3f9e3f", dmg:25, rate:1.6, shots:3, unlock:10 },
    cactus:    { name:"仙人掌", cost:125, cooldown:6,  hp:60, kind:"shooter", color:"#5aa84a", dmg:20, rate:1.4, shots:1, spike:true, back:true },  // 穿透尖刺(仅地面)·可向后射击
    bigcactus: { name:"巨仙掌", cost:225, cooldown:10, hp:80, kind:"shooter", color:"#3f7e33", dmg:25, rate:1.4, shots:1, spike:true, air:true, unlock:10 },  // 穿透尖刺·可打空中(10波解锁)
    jalapeno:  { name:"辣椒",  cost:150, cooldown:25, hp:60,  kind:"rowbomb",   color:"#d23f3f", unlock:20 },
    campfire:  { name:"篝火",  cost:175, cooldown:15, hp:200, kind:"torch",    color:"#ff7a1e", unlock:10 },
    wallnut:   { name:"坚果",  cost:50,  cooldown:15, hp:320, kind:"defense",  color:"#c99761" },
    potatoshield:{ name:"土豆盾", cost:75, cooldown:20, hp:520, kind:"defense", color:"#9c6b3a" },
    cherrybomb:{ name:"樱桃",  cost:150, cooldown:22, hp:60,  kind:"bomb",     color:"#e0413f" },
    potatomine:{ name:"地雷",  cost:25,  cooldown:18, hp:60,  kind:"mine",     color:"#b58a4c" },
  };
  const CARD_ORDER = ["sunflower","peashooter","snowpea","repeater","threepeater","cactus","bigcactus","campfire","wallnut","potatoshield","jalapeno","cherrybomb","potatomine"];

  // ---------- Zombie definitions ----------
  const ZTYPES = {
    // hp = 总血量, body = 脱去护甲后的本体血量(护甲血 = hp - body)
    basic:     { name:"普通", hp:110,  body:110,  speed:14,   accessory:null },
    cone:      { name:"路障", hp:220,  body:110,  speed:13,   accessory:"cone" },      // 护甲≈1个普通, 共2个普通
    bucket:    { name:"铁桶", hp:500,  body:110,  speed:12,   accessory:"bucket" },    // 铁桶帽
    ironclad:  { name:"铁甲", hp:850,  body:110,  speed:10.5, accessory:"ironclad" },  // 钢盔
    polevault: { name:"撑杆", hp:160,  body:160,  speed:30,   accessory:"pole" },
    football:  { name:"橄榄球", hp:600, body:110, speed:23,   accessory:"football" },  // 头盔护甲, 速度快
    gargantuar:{ name:"巨人", hp:3400, body:3400, speed:8,    accessory:"garg", big:true, eat:70 },
    spider:    { name:"蜘蛛", hp:150,  body:150,  speed:0,    accessory:"spider" },   // 空降偷植物
    balloon:   { name:"气球", hp:90,   body:90,   speed:17,   accessory:"balloon", fly:true },     // 飞行,需对空
    screendoor:{ name:"铁门", hp:110,  body:110,  speed:11,   accessory:"screendoor", door:420 },  // 铁门挡豌豆,怕火/爆炸
    mingzombie:{ name:"鸣人", hp:6000, body:6000, speed:7,    accessory:"ming", big:true, eat:140, beam:true },  // 100波后Boss: 能量极光穿透整行
    witch:     { name:"女巫", hp:1300, body:1300, speed:11,   accessory:"witch", buff:true },  // 80波后: 每5秒给周围僵尸+500%血2秒
  };

  // ---------- Waves ----------
  // ---------- State ----------
  let state, plants, zombies, peas, suns, particles, explosions, mowers, debris, mashes, beams;
  let rowShield;   // 每行无敌护盾剩余秒数(终极向日葵技能)
  let sun, selected, lastCardUse, gameTime, shovelMode;
  let running = false, lastTs = 0;
  let mouse = { x:0, y:0 };
  let nextSkyDrop = 4;
  let bannerTimer = 0, bannerText = "";
  // endless mode
  let waveNum = 0, nextWaveAt = 10, score = 0, gameSpeed = 1, lastSaved = null;
  let frostCd = 20;   // 终极寒冰 全屏冰霜雪雨 全局冷却(100波后)
  let runId = 0;   // increments on each reset; stale scheduled spawns from old runs are ignored
  let bestScore = 0;
  let upgradeMenu = null;   // {p} when choosing a branch for a Lv0 sunflower
  let showInfo = false;     // 按住 Alt/Option 显示所有植物属性

  const SPEEDS = [1,2,3];
  let paused = false;
  const RESTARTBTN = { x: W-300, y: H-44, w: 84, h: 30 };
  const PAUSEBTN   = { x: W-208, y: H-44, w: 84, h: 30 };
  const SPEEDBTN   = { x: W-116, y: H-44, w: 108, h: 30 };
  const KILLPTS = { basic:10, cone:25, polevault:30, bucket:60, football:80, ironclad:120, gargantuar:400, spider:60, balloon:45, screendoor:70, mingzombie:2000, witch:450 };
  /* ===== highscore ===== */
  // ---------- High scores (localStorage) ----------
  const HS_KEY = "pvz_endless_highscores_v1";
  function loadHighScores(){
    try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch(e){ return []; }
  }
  function saveHighScore(entry){
    let hs = loadHighScores();
    hs.push(entry);
    hs.sort((a,b)=> b.score - a.score);
    hs = hs.slice(0,10);
    try { localStorage.setItem(HS_KEY, JSON.stringify(hs)); } catch(e){}
    return hs;
  }
  function fmtClock(sec){ const m=Math.floor(sec/60), s=Math.floor(sec%60); return m+":"+String(s).padStart(2,"0"); }
  // 大数字缩写：超过 1 万显示 K，超过百万显示 M
  function fmtNum(n){
    n = Math.round(n);
    if(n>=1e6) return (+(n/1e6).toFixed(2))+"M";
    if(n>=1e4) return (+(n/1e3).toFixed(1))+"K";
    return ""+n;
  }
  /* ===== state ===== */
  function reset(){
    state = "playing";
    plants = []; zombies = []; peas = []; suns = []; particles = []; explosions = []; debris = []; mashes = []; beams = [];
    rowShield = [0,0,0,0,0];
    mowers = [];
    for(let r=0;r<ROWS;r++) mowers.push({ r, x:GRID.x-34, y:cellCenterY(r)+20, active:false, used:false, t:0 });
    sun = 75; selected = null; shovelMode = false; showInfo = false;
    lastCardUse = {}; CARD_ORDER.forEach(k=>lastCardUse[k] = -99);
    gameTime = 0;
    nextSkyDrop = 4;
    waveNum = 0; nextWaveAt = 10; score = 0; gameSpeed = 1; lastSaved = null; frostCd = 20;
    bannerTimer = 0;
    runId++;   // invalidate any pending spawn timers from a previous game
    bestScore = (loadHighScores()[0]||{}).score || 0;
    upgradeMenu = null;
    paused = false;
  }

  // 僵尸出场最早波数 (气球10波后、巨人20波后、女巫80波后、鸣人Boss 100波后)
  const ZMINWAVE = { balloon:11, gargantuar:20, witch:81, mingzombie:101 };
  // pool of zombie types by wave (difficulty ramps; heavies unlock progressively, no cap)
  function poolForWave(n){
    let pool;
    if(n<=2)       pool=["basic","basic","cone"];
    else if(n<=4)  pool=["basic","cone","cone","polevault"];
    else if(n<=6)  pool=["basic","cone","bucket","polevault"];
    else if(n<=9)  pool=["cone","bucket","polevault","ironclad","spider","balloon","screendoor"];
    else if(n<=13) pool=["cone","bucket","polevault","ironclad","football","spider","balloon","screendoor"];
    else if(n<=18) pool=["bucket","polevault","ironclad","football","ironclad","spider","balloon","screendoor"];
    else if(n<=26) pool=["bucket","ironclad","football","ironclad","gargantuar","polevault","spider","balloon","screendoor"];
    else           pool=["ironclad","football","gargantuar","ironclad","football","bucket","gargantuar","polevault","spider","balloon","screendoor","mingzombie","witch"];
    pool = pool.filter(tt => n >= (ZMINWAVE[tt]||0));   // 未到出场波数则剔除
    return pool.length ? pool : ["basic"];
  }
  const rRow = ()=> Math.floor(Math.random()*ROWS);

  function spawnWave(n){
    const big = (n % 5 === 0);
    let count = Math.min(28, 2 + Math.floor(n*0.55));
    if(big) count = Math.round(count*1.5);
    const pool = poolForWave(n);
    const stepMs = big ? 480 : 700;
    const rid = runId;   // bind spawns to this game instance
    const spawn = (type)=>{ if(state==="playing" && runId===rid) addZombie(type, rRow()); };
    // big wave: a powerful leader (or two) charges in first
    if(big){
      const leader = n>=100 ? "mingzombie" : (n>=20 ? "gargantuar" : (n>=10 ? "ironclad" : "bucket"));
      const leaders = n>=30 ? 3 : (n>=15 ? 2 : 1);
      for(let L=0; L<leaders; L++)
        setTimeout(()=> spawn(leader), L*260);
    }
    for(let k=0;k<count;k++){
      setTimeout(()=> spawn(pool[Math.floor(Math.random()*pool.length)]), (big?300:0) + k*stepMs);
    }
  }
  /* ===== entities ===== */
  // ---------- Entities ----------
  function addPlant(type, r, c){
    const def = PLANTS[type];
    const p = { type, kind:def.kind, r, c, x:cellCenterX(c), y:cellCenterY(r),
      hp:def.hp, maxHp:def.hp, baseMaxHp:def.hp, selfHpMult:1, t:Math.random()*2, shootCd:0.6, recoil:0, up:0, branch:null };
    if(type==="cherrybomb") p.fuse = 1.0;
    if(type==="jalapeno") p.fuse = 1.0;
    if(type==="potatomine"){ p.arm = 6; p.armed = false; }
    plants.push(p);
  }
  function addZombie(type, row){
    const d = ZTYPES[type];
    const hp = d.hp;
    zombies.push({
      type, r:row, x:W + 30 + Math.random()*40, y:cellCenterY(row),
      hp, maxHp:hp, bodyMax:(d.body!=null?d.body:hp), baseSpeed:d.speed + Math.random()*2,
      eating:false, t:Math.random()*Math.PI*2, slowT:0, freezeT:0, freezeImmune:0, mireT:0, vaulted:false, vaultAnim:0,
      big:!!d.big, eat:d.eat||35, armorBroken:false,
    });
    const z = zombies[zombies.length-1];
    if(type==="spider"){
      // 空降：落在最右侧 4 列范围内的某格
      const col = COLS-1 - Math.floor(Math.random()*4);     // 列 5..8
      z.col = col; z.x = cellCenterX(col); z.y = TOPBAR_H-20;
      z.phase = "drop"; z.targetY = cellCenterY(row); z.grabT = 0.6; z.carry = null;
    }
    if(d.fly){ z.fly = true; z.baseRowY = cellCenterY(row); z.y = z.baseRowY - 32; }   // 气球飞行高度
    if(d.door!=null){ z.doorHp = d.door; }                                             // 铁门护盾值
    if(d.beam){ z.beam = true; z.beamCd = 3.5; }                                       // 鸣人: 能量极光
    if(d.buff){ z.buff = true; z.buffCd = 5; }                                         // 女巫: 群体增益
  }
  function addPea(x,y,r,freeze,air,spike,fdur,dir){
    if(freeze){
      // 抛物线投掷冰冻弹：朝本行最近僵尸抛出
      let tx = x+300;
      let best = Infinity;
      for(const z of zombies){ if(z.r===r && z.x>x && z.hp>0){ const d=z.x-x; if(d<best){ best=d; tx=z.x; } } }
      const baseY = cellCenterY(r);
      const D = Math.max(120, tx - x);                     // reach the target, any distance
      const apex = 95, vx = 330, T = D/vx, g = 8*apex/(T*T), vy0 = -g*T/2;  // constant apex, lands at baseY
      peas.push({ x, y:baseY-2, r, arc:true, vx, vy:vy0, g, baseY, dmg:25, freeze:true, freezeDur: fdur||1.5 });
      return;
    }
    const pea = { x, y, r, speed:330, dmg:25, freeze:false, air:!!air, spike:!!spike, dir:dir||1 };
    if(spike) pea.hit = new Set();   // 穿透: 记录已命中的僵尸, 避免重复
    peas.push(pea);
  }
  function iceBurst(px, py, r, dur){
    dur = dur||1.5;
    explosions.push({ x:px, y:py, r:0, max:50, t:0, life:0.4, color:"#9fd8f5" });
    for(const z of zombies){
      // 小范围冻结(只冻命中点附近1格), 不再整片锁场
      if(z.hp>0 && Math.hypot(z.x-px, z.y-py) < 50){
        z.hp -= 15;
        if(z.freezeT<=0 && (z.freezeImmune||0)<=0){ z.freezeT = dur; z.slowT = 0; }  // 解冻后免疫期内不可再冻, 杜绝无限冰冻
      }
    }
    spawnParticles(px, py, "#bfe9fb", 12, 160);
    spawnShards(px, py, 5, ["#dff4fc","#bfe9fb"]);
  }
  function addSun(x,y,fromSky,value){
    suns.push({ x, y, vy:fromSky?28:-40,
      targetY:fromSky?(GRID.y + Math.random()*(ROWS*GRID.ch-40)):y,
      landed:!fromSky, hop:fromSky?0:1, hopVy:fromSky?0:-70, value:value||25, life:9, t:0, fromSky,
      big:(value||25)>=100 });
  }

  // ---------- Sunflower upgrade auras (unlocked after wave 15) ----------
  // 两条分支: branch="atk"(攻速, 每级+20% 满级x2) / "hp"(血量, 每级+50% 本行植物血量)
  // Lv5 后合流: Lv6 钢化(再 +100% 血) / Lv7 终极(全场CD-50% 且自身产阳光x10)
  const UPGRADE_WAVE = 5;
  function rowAttackMult(r){
    let lvl=0;
    for(const p of plants) if(p.type==="sunflower" && p.r===r && p.branch==="atk" && p.up>=1) lvl=Math.max(lvl, Math.min(p.up,5));
    return 1 + 0.2*lvl;                 // atk-branch Lv5 -> x2 fire rate
  }
  function rowHpMult(r){
    let m=1;
    for(const p of plants){ if(p.type==="sunflower" && p.r===r){
      let pm = 1;
      if(p.branch==="hp") pm *= (1 + 0.5*Math.min(p.up,5));   // 血量分支 每级+50%
      if(p.up>=6) pm *= 2;                                    // 钢化 +100%
      m = Math.max(m, pm);                                    // 取本行最强一株, 不叠乘
    }}
    return m;
  }
  function ultimateActive(){ return plants.some(p=>p.type==="sunflower" && p.up>=7); }
  function nextUpgradeCost(p){
    if(!p) return null;
    if(p.type==="sunflower"){
      if(p.up<5) return 250;
      if(p.up===5) return 1000;          // Lv6 钢化
      if(p.up===6) return 1500;          // Lv7 终极
      return null;
    }
    if(p.type==="potatoshield"){ return p.up<10 ? 250 : null; }   // 每级+50%血, 最高Lv10
    if(p.type==="snowpea"){ return p.up<5 ? 250 : null; }          // 每级+0.2s冰冻, 最高Lv5
    return null;
  }
  function upgradeLabel(p){
    const up=p.up, b=p.branch;
    if(up<=0) return "向日葵";
    if(up<=5) return (b==="hp"?"血量向日葵 Lv":"攻速向日葵 Lv")+up;
    return up===6 ? "钢化向日葵" : "终极向日葵";
  }
  function effCooldown(key){ return PLANTS[key].cooldown * (ultimateActive()?0.5:1); }
  function cardLocked(key){ return (PLANTS[key].unlock||0) > waveNum; }   // 未到解锁波数

  // branch-selection menu geometry/hit-test
  function upgradeMenuRects(){
    if(!upgradeMenu) return null;
    const p=upgradeMenu.p, bw=72, bh=30, gap=10, totalW=bw*2+gap;
    const y=Math.max(GRID.y+2, cellY(p.r)-42);
    let x0=p.x-totalW/2;
    x0=Math.max(GRID.x+2, Math.min(x0, GRID.x+COLS*GRID.cw-totalW-2));
    return { atk:{x:x0,y,w:bw,h:bh}, hp:{x:x0+bw+gap,y,w:bw,h:bh}, cx:x0+totalW/2, ty:y-18 };
  }
  function upgradeMenuHit(mx,my){
    const r=upgradeMenuRects(); if(!r) return null;
    const inside=b=>mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h;
    if(inside(r.atk)) return "atk";
    if(inside(r.hp)) return "hp";
    return null;
  }
  function spawnParticles(x,y,color,n,spread){
    spread = spread||120;
    for(let i=0;i<n;i++) particles.push({ x,y,
      vx:(Math.random()-.5)*spread, vy:(Math.random()-.7)*spread,
      life:.5+Math.random()*.4, t:0, color, size:3+Math.random()*3 });
  }
  // shatter shards: rotating fragments that fly out and fall (for ice break / armor break)
  function spawnShards(x,y,n,colors,shape){
    if(typeof colors==="string") colors=[colors];
    shape = shape||"tri";
    for(let i=0;i<n;i++) particles.push({ x:x+(Math.random()-.5)*22, y:y+(Math.random()-.5)*22,
      vx:(Math.random()-.5)*230, vy:-Math.random()*210-40,
      life:.6+Math.random()*.5, t:0, color:colors[i%colors.length], size:4+Math.random()*5,
      shard:true, shape, rot:Math.random()*6.28, vrot:(Math.random()-.5)*14 });
  }
  // 掉落的头盔：飞出后落到地上躺一会儿再渐隐
  function spawnHelmet(z){
    debris.push({ type:z.type, x:z.x+(Math.random()*8-4), y:z.y-30,
      vx:-40 + (Math.random()*60-30), vy:-220-Math.random()*60,
      rot:(Math.random()*0.6-0.3), vrot:(Math.random()-.5)*10,
      groundY: cellCenterY(z.r)+34, landed:false, life:4.5, t:0 });
  }
  function explode(x,y,radius,dmg,color){
    explosions.push({ x, y, r:0, max:radius, t:0, life:0.5, color:color||"#ff8a1e" });
    for(const z of zombies){
      if(Math.hypot(z.x-x, z.y-y) < radius){ z.hp -= dmg; }
    }
    spawnParticles(x,y,"#ffb14e",24,300);
    spawnParticles(x,y,"#ff5a1e",16,260);
  }
  /* ===== update ===== */
  // ---------- Update ----------
  function update(dt){
    if(state!=="playing") return;
    gameTime += dt;

    nextSkyDrop -= dt;
    if(nextSkyDrop<=0){
      nextSkyDrop = 6 + Math.random()*3;
      addSun(GRID.x + 40 + Math.random()*(COLS*GRID.cw-80), TOPBAR_H+10, true);
    }

    // endless wave scheduler
    if(gameTime >= nextWaveAt){
      waveNum++;
      const big = (waveNum % 5 === 0);
      spawnWave(waveNum);
      score += 50 + waveNum*15;                 // survival/progress bonus for reaching a wave
      showBanner(big ? ("⚠ 第 "+waveNum+" 波 · 巨潮来袭！") : ("第 "+waveNum+" 波"));
      const interval = Math.max(12, 26 - waveNum*0.35);
      nextWaveAt = gameTime + (big ? interval + 8 : interval);
    }

    // 全局计时: 行无敌护盾倒计时 / 能量极光残留 / 终极寒冰全屏冰霜
    for(let r=0;r<ROWS;r++) if(rowShield[r]>0) rowShield[r]-=dt;
    for(const b of beams) b.t+=dt;
    beams = beams.filter(b=>b.t<b.life);
    if(waveNum>=100 && plants.some(p=>p.type==="snowpea" && p.up>=5)){
      frostCd -= dt;
      if(frostCd<=0){ frostCd = 20;
        for(const z of zombies){ if(z.hp>0){ z.freezeT=3; z.freezeImmune=0; z.slowT=0; } }   // 全屏冰冻3秒
        for(let i=0;i<32;i++) spawnParticles(GRID.x+Math.random()*COLS*GRID.cw, GRID.y+Math.random()*(ROWS*GRID.ch), "#bfe9fb", 1, 60);
        showBanner("❄️ 终极寒冰 · 冰霜雪雨！");
      }
    }

    // plants
    for(const p of plants){
      p.t += dt;
      if(p.recoil>0) p.recoil -= dt;
      const def = PLANTS[p.type];

      // 血量光环(血量分支 + 钢化) × 自身升级(土豆盾)：动态调整最大血量
      const targetMax = p.baseMaxHp * (p.selfHpMult||1) * rowHpMult(p.r);
      if(Math.abs(targetMax - p.maxHp) > 0.5){
        const add = targetMax - p.maxHp;
        p.maxHp = targetMax;
        p.hp = Math.min(p.maxHp, p.hp + Math.max(0, add));   // 升级时回血, 失去光环时夹紧
      }

      if(p.kind==="producer"){
        // 每级升级提升阳光产量; 终极(Lv7)产阳光x10
        if(p.t>=7){ p.t=0; const val=(p.up>=7)?250:Math.round(25*(1+0.4*p.up)); addSun(p.x, p.y-10, false, val); }
        // 终极向日葵(Lv7) 技能 — 按流派区分
        if(p.up>=7){
          if(p.branch==="atk" && waveNum>=100){
            // 攻速流: 100波后 每20秒给本行 2秒无敌护盾
            if(p.skillCd==null) p.skillCd=20;
            p.skillCd -= dt;
            if(p.skillCd<=0){ p.skillCd=20; rowShield[p.r]=Math.max(rowShield[p.r],2); showBanner("🌻 终极向日葵(攻速) · 无敌护盾！"); }
          } else if(p.branch==="hp"){
            // 血量流: 每10秒给本行所有植物回血 20% 最大血量
            if(p.healCd==null) p.healCd=10;
            p.healCd -= dt;
            if(p.healCd<=0){ p.healCd=10;
              for(const q of plants){ if(q.r===p.r && q.hp>0 && q.hp<q.maxHp){ q.hp=Math.min(q.maxHp, q.hp + q.maxHp*0.2); spawnParticles(q.x, q.y-10, "#7fd07a", 6, 140); } }
              showBanner("🌻 终极向日葵(血量) · 本行回血 +20%！");
            }
          }
        }

      } else if(p.kind==="shooter" || p.kind==="shooter3"){
        const rows = p.kind==="shooter3" ? [p.r-1,p.r,p.r+1].filter(rr=>rr>=0&&rr<ROWS) : [p.r];
        const canHit = z => rows.includes(z.r) && z.hp>0 && (def.air || !z.fly);
        // 普通仙人掌(back)：后方有僵尸优先向后打；否则向前
        let dir = 1, target = null;
        if(def.back){
          const behind = zombies.find(z=> canHit(z) && z.x < p.x+10);
          if(behind){ dir = -1; target = behind; }
          else target = zombies.find(z=> canHit(z) && z.x > p.x-10);
        } else {
          target = zombies.find(z=> canHit(z) && z.x > p.x-10);
        }
        p.shootCd -= dt;
        if(target && p.shootCd<=0){
          p.shootCd = def.rate / rowAttackMult(p.r);   // 攻速光环
          const shots = def.shots||1;
          const ox = dir>0 ? p.x+24 : p.x-24;
          for(let s=0; s<shots; s++){
            const fdur = 1.5 + 0.2*(p.up||0);   // 寒冰升级延长冰冻时长
            if(s===0){ for(const rr of rows) addPea(ox, p.y-6, rr, def.freeze, def.air, def.spike, fdur, dir); }
            else { const rid=runId; setTimeout(()=>{ if(state==="playing" && runId===rid) for(const rr of rows) addPea(ox, p.y-6, rr, def.freeze, def.air, def.spike, fdur, dir); }, s*120); }
          }
          p.recoil = 0.12;
        }

      } else if(p.kind==="bomb"){
        p.fuse -= dt;
        if(p.fuse<=0){
          explode(p.x, p.y-6, GRID.cw*1.6, 1800, "#ff5a1e");
          p.dead = true;
        }

      } else if(p.kind==="rowbomb"){   // 辣椒：清掉一整横排
        p.fuse -= dt;
        if(p.fuse<=0){
          const cy = cellCenterY(p.r);
          for(const z of zombies){ if(z.r===p.r) z.hp = 0; }
          // 火线特效
          for(let gx=GRID.x+20; gx<GRID.x+COLS*GRID.cw; gx+=46){
            explosions.push({ x:gx, y:cy, r:0, max:40, t:0, life:0.45, color:"#ff5a1e" });
            spawnParticles(gx, cy, "#ffb14e", 5, 200);
          }
          p.dead = true;
        }

      } else if(p.kind==="mine"){
        if(!p.armed){ p.arm -= dt; if(p.arm<=0) p.armed = true; }
        else {
          const z = zombies.find(z=> z.r===p.r && Math.abs(z.x-p.x)<42 && z.hp>0);
          if(z){ explode(p.x, p.y, GRID.cw*0.9, 1800, "#ffcaa0"); p.dead = true; }
        }
      }
    }

    // peas
    for(const pea of peas){
      // 抛物线冰冻弹
      if(pea.arc){
        pea.x += pea.vx*dt; pea.vy += pea.g*dt; pea.y += pea.vy*dt;
        // 飞行拖尾
        if(Math.random()<0.7) particles.push({ x:pea.x, y:pea.y, vx:0, vy:8, life:0.35, t:0, color:"#cfeefb", size:2.6 });
        let burst=false;
        for(const z of zombies){ if(z.r===pea.r && z.hp>0 && Math.abs(z.x-pea.x)<28 && Math.abs(z.y-pea.y)<44){ burst=true; break; } }
        if(!burst && pea.vy>0 && pea.y>=pea.baseY){ burst=true; pea.y=pea.baseY; }
        if(burst){ iceBurst(pea.x, pea.baseY, pea.r, pea.freezeDur); pea.dead=true; }
        else if(pea.x>W+20) pea.dead=true;
        continue;
      }
      pea.x += pea.speed*(pea.dir||1)*dt;
      // pass through a campfire -> become a fire pea: +30% damage, explosive splash
      // 冰冻弹(freeze)不会被附魔, 不叠加火焰
      if(!pea.fire && !pea.freeze){
        const torch = plants.find(p=>p.kind==="torch" && p.hp>0 && p.r===pea.r && Math.abs(p.x-pea.x)<26);
        if(torch){
          pea.fire = true;
          pea.dmg = Math.round(pea.dmg * 1.3);         // +30% damage
          spawnParticles(pea.x, pea.y, "#ff9a3c", 6, 90);
        }
      }
      // 尖刺：贯穿整行, 命中每只僵尸一次, 不消失
      if(pea.spike){
        for(const z of zombies){
          if(z.r===pea.r && z.hp>0 && Math.abs(z.x-pea.x)<26 && !pea.hit.has(z) && (pea.air || !z.fly)){
            pea.hit.add(z);
            if(z.doorHp>0 && !pea.fire){
              z.doorHp -= pea.dmg; spawnParticles(pea.x, pea.y, "#cfd4da", 4);
              if(z.doorHp<=0) spawnShards(z.x+16, z.y-4, 11, ["#c2c7cf","#9aa0aa"], "square");
            } else {
              z.hp -= pea.dmg;
              spawnParticles(pea.x, pea.y, pea.fire?"#ff7a1e":"#cfe6a0", 4);
            }
          }
        }
        if(pea.x>W+20 || pea.x<-20) pea.dead = true;
        continue;
      }
      for(const z of zombies){
        if(z.r===pea.r && Math.abs(z.x-pea.x)<26 && z.hp>0 && (pea.air || !z.fly)){
          // 铁门挡住普通豌豆(伤害打在门上)；火焰豌豆无视铁门直接打本体
          if(z.doorHp>0 && !pea.fire){
            z.doorHp -= pea.dmg;
            spawnParticles(pea.x, pea.y, "#cfd4da", 5);
            if(z.doorHp<=0) spawnShards(z.x+16, z.y-4, 11, ["#c2c7cf","#9aa0aa"], "square");
            pea.dead = true; break;
          }
          z.hp -= pea.dmg;
          if(pea.fire){
            // 爆裂(范围)伤害：溅射到同行附近的僵尸
            explosions.push({ x:pea.x, y:pea.y, r:0, max:44, t:0, life:0.3, color:"#ff7a1e" });
            for(const z2 of zombies){
              if(z2!==z && z2.r===pea.r && Math.abs(z2.x-pea.x)<48 && z2.hp>0) z2.hp -= pea.dmg*0.5;
            }
            spawnParticles(pea.x, pea.y, "#ff7a1e", 9, 170);
          } else if(pea.freeze){
            // 投掷冰冻弹命中：范围冰冻1.5秒(完全停滞)
            explosions.push({ x:pea.x, y:pea.y, r:0, max:70, t:0, life:0.4, color:"#9fd8f5" });
            for(const z2 of zombies){
              if(z2.hp>0 && Math.hypot(z2.x-pea.x, z2.y-pea.y) < 78){ z2.freezeT = 3; z2.slowT = 0; }
            }
            spawnParticles(pea.x, pea.y, "#bfe9fb", 14, 200);
          } else {
            spawnParticles(pea.x, pea.y, "#9be36b", 5);
          }
          pea.dead = true; break;
        }
      }
      if(pea.x>W+20 || pea.x<-20) pea.dead = true;
    }
    peas = peas.filter(p=>!p.dead);

    // 土豆泥: 区域内僵尸大幅减速 (每帧刷新 mireT)
    for(const m of mashes){ m.t += dt;
      for(const z of zombies){ if(z.r===m.r && Math.abs(z.x-m.x) < m.w/2+8) z.mireT = 0.2; }
    }
    mashes = mashes.filter(m=>m.t < m.life);

    // zombies
    for(const z of zombies){
      z.t += dt;
      if(z.slowT>0) z.slowT -= dt;
      if(z.mireT>0) z.mireT -= dt;
      const wasFrozen = z.freezeT>0;
      if(z.freezeT>0) z.freezeT -= dt;
      if(z.freezeImmune>0) z.freezeImmune -= dt;
      if(wasFrozen && z.freezeT<=0){ spawnShards(z.x, z.y-18, 12, ["#dff4fc","#bfe9fb","#9fd8f5"]); z.freezeImmune = 1.5; }  // 解冻→碎裂+免疫1.5s
      // 护甲被打掉的碎裂动画
      if(!z.armorBroken && z.maxHp>z.bodyMax && z.hp<=z.bodyMax){
        z.armorBroken = true;
        const a = {cone:{c:["#e08a2e","#b96d1c"],s:"tri"}, bucket:{c:["#c2c7cf","#9aa0aa"],s:"square"},
                   ironclad:{c:["#aab0b8","#7e848c"],s:"square"}, football:{c:["#c64b4b","#7a2b2b"],s:"square"}}[z.type];
        if(a){ spawnShards(z.x, z.y-34, 13, a.c, a.s); spawnHelmet(z); }
      }
      if(z.vaultAnim>0) z.vaultAnim -= dt;
      // 女巫增益到期 -> 还原血量(+500%临时血)
      if(z.buffT>0){ z.buffT-=dt; if(z.buffT<=0 && z.buffActive){ z.buffActive=false; z.maxHp/=6; if(z.hp>z.maxHp) z.hp=z.maxHp; } }
      const frozen = z.freezeT>0;

      // 女巫: 每5秒给周围僵尸 +500% 血量(持续2秒)
      if(z.buff && !frozen){
        if(z.buffCd==null) z.buffCd=5;
        z.buffCd -= dt;
        if(z.buffCd<=0){ z.buffCd=5;
          for(const z2 of zombies){ if(z2.hp>0 && Math.hypot(z2.x-z.x, z2.y-z.y) < GRID.cw*1.6){
            if(!z2.buffActive){ z2.buffActive=true; z2.maxHp*=6; z2.hp*=6; }   // +500% 血
            z2.buffT = 2;
          }}
          for(let i=0;i<16;i++) spawnParticles(z.x, z.y-10, "#c77dff", 1, 180);
        }
      }
      // 鸣人Boss: 能量极光 — 穿透整行, 高伤
      if(z.beam && !frozen){
        if(z.beamCd==null) z.beamCd=3.5;
        z.beamCd -= dt;
        if(z.beamCd<=0){ z.beamCd=3.5;
          beams.push({ r:z.r, x:z.x, t:0, life:0.5 });
          if(rowShield[z.r]<=0){ for(const p of plants){ if(p.r===z.r && p.hp>0){ p.hp-=250; if(p.hp<=0) p.dead=true; } } }
        }
      }

      // 空降蜘蛛：下降 → 抓取 → 升空带走
      if(z.type==="spider"){
        if(!frozen){
          if(z.phase==="drop"){
            z.y += 135*dt;
            if(z.y>=z.targetY){ z.y=z.targetY; z.phase="grab"; }
          } else if(z.phase==="grab"){
            z.grabT -= dt;
            if(z.grabT<=0){
              const idx = plants.findIndex(pl=>pl.r===z.r && pl.c===z.col);
              if(idx>=0){ z.carry = plants[idx]; spawnParticles(z.x, z.y, "#caa", 10); plants.splice(idx,1); }
              z.phase = "lift";
            }
          } else { // lift
            z.y -= 115*dt;
            if(z.y < TOPBAR_H-50) z.gone = true;
          }
        }
        continue;   // 蜘蛛不走地面、不触发推车
      }

      const speed = frozen ? 0 : z.baseSpeed * (z.slowT>0 ? 0.45 : 1) * (z.mireT>0 ? 0.22 : 1);

      // 飞行单位(气球)无视植物, 直接飘过
      const blocker = z.fly ? null : plants.find(p=> p.r===z.r && p.hp>0 && p.kind!=="bomb" && p.kind!=="rowbomb" && Math.abs(p.x - z.x) < 40 && p.x < z.x+10);

      if(blocker && z.type==="polevault" && !z.vaulted && !frozen){
        z.vaulted = true; z.vaultAnim = 0.5; z.x = blocker.x - 46;
      } else if(blocker && z.type==="gargantuar"){
        // 巨人重砸：每下造成固定伤害(肉盾可扛几下)，砸完短暂停顿
        z.eating = true;
        if(z.freezeT>0){ /* 冰冻时停手 */ }
        else if(rowShield[blocker.r]>0){ /* 本行无敌护盾, 砸不动 */ }
        else {
          z.smashCd = (z.smashCd||0) - dt;
          if(z.smashCd<=0){
            spawnParticles(blocker.x, blocker.y, PLANTS[blocker.type].color, 16, 220);
            explode(blocker.x, blocker.y, 6, 0, "#caa");   // dust puff (0 dmg)
            blocker.dead = true;                            // 一拳碎植物
            z.smashCd = 1.3;
          }
        }
      } else if(blocker){
        z.eating = true;
        if(!frozen && rowShield[blocker.r]<=0){
          blocker.hp -= z.eat*dt;
          if(blocker.hp<=0){ spawnParticles(blocker.x, blocker.y, PLANTS[blocker.type].color, 12); blocker.dead = true; }
        }
      } else {
        z.eating = false;
        z.x -= speed*dt;
      }
      if(z.x < GRID.x + 8){
        const m = mowers.find(m=>m.r===z.r && !m.used);
        if(m){ m.active = true; m.used = true; }          // launch the lawn-mower
        else if(z.x < GRID.x - 28){ state="lost"; endGame(); } // no mower left
      }
    }

    // lawn-mowers sweep
    for(const m of mowers){
      if(m.active){
        m.t += dt;
        m.x += 430*dt;
        for(const z of zombies){
          if(z.r===m.r && z.hp>0 && z.x < m.x+34 && z.x > m.x-34){
            z.hp = 0; spawnParticles(z.x, z.y, "#7a9e5e", 10);
          }
        }
        if(m.x > W+40) m.active = false;  // gone; stays used
      }
    }

    // 土豆盾被摧毁 -> 爆炸(伤害随等级) + Lv5以上留下土豆泥减速区
    for(const p of plants){
      if(p.dead && p.type==="potatoshield" && !p._boomed){
        p._boomed = true;
        const dmg = 120 + (p.up||0)*70;
        explode(p.x, p.y, GRID.cw*1.15, dmg, "#caa15a");
        spawnShards(p.x, p.y, 10, ["#b58a4c","#9c733a"]);
        if((p.up||0) >= 5) mashes.push({ r:p.r, x:p.x, w:GRID.cw, t:0, life:9 });   // 土豆泥
      }
    }
    plants = plants.filter(p=>!p.dead);
    zombies = zombies.filter(z=>{
      if(z.gone) return false;   // 蜘蛛带着植物飞走了(不计分)
      if(z.hp<=0){
        spawnParticles(z.x,z.y,"#7a9e5e",14);
        if(z.freezeT>0) spawnShards(z.x,z.y-18,8,["#dff4fc","#bfe9fb"]);
        if(z.type==="gargantuar"){   // 巨人死亡爆炸: 波及周围植物
          explode(z.x, z.y, GRID.cw*1.5, 0, "#ff5a1e"); spawnShards(z.x,z.y-20,16,["#7a9e5e","#5a6b3c"]);
          for(const p of plants){ if(rowShield[p.r]<=0 && Math.hypot(p.x-z.x, p.y-z.y) < GRID.cw*1.4){ p.hp -= 320; if(p.hp<=0) p.dead=true; } }
        }
        score += (KILLPTS[z.type]||10); return false;
      }
      return true;
    });

    // suns
    for(const s of suns){
      s.t += dt;
      if(s.fromSky && !s.landed){
        s.y += s.vy*dt; if(s.y>=s.targetY){ s.y=s.targetY; s.landed=true; }
      } else if(!s.fromSky && s.hop){
        s.hopVy += 200*dt; s.y += s.hopVy*dt; if(s.hopVy>0 && s.y>=s.targetY+20) s.hop=0;
      }
      if(s.landed || (!s.fromSky && !s.hop)) s.life -= dt;
      if(s.life<=0) s.dead = true;
    }
    suns = suns.filter(s=>!s.dead);

    for(const pt of particles){ pt.t+=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=(pt.shard?520:200)*dt; if(pt.shard) pt.rot+=pt.vrot*dt; }
    particles = particles.filter(p=>p.t<p.life);
    // 掉落头盔
    for(const d of debris){
      d.t += dt;
      if(!d.landed){
        d.vy += 900*dt; d.x += d.vx*dt; d.y += d.vy*dt; d.rot += d.vrot*dt;
        if(d.y >= d.groundY){ d.y=d.groundY; d.landed=true; d.vy=0; d.vx*=0.2; d.vrot=0;
          // 躺平到接近水平
          d.rot = (d.rot>0?1:-1) * (Math.PI/2 - 0.2);
        }
      }
    }
    debris = debris.filter(d=>d.t < d.life);
    for(const e of explosions){ e.t+=dt; e.r = e.max*Math.min(1,e.t/0.18); }
    explosions = explosions.filter(e=>e.t<e.life);
    // endless: no win condition — survive as long as possible
  }
  /* ===== render ===== */
  // ---------- Drawing ----------
  function draw(){
    ctx.fillStyle = "#7cc3e8"; ctx.fillRect(0,0,W,H);
    drawTopBar();
    drawLawn();
    drawMashes();
    drawMowers();
    drawDebris();
    for(const p of plants) drawPlant(p);
    for(const pea of peas) drawPea(pea);
    [...zombies].sort((a,b)=>a.y-b.y).forEach(drawZombie);
    drawBeams();
    drawSuns();
    drawExplosions();
    drawParticles();
    drawShields();
    drawSelectionGhost();
    drawPlantInfo();
    drawUpgradeHint();
    drawUpgradeMenu();
    drawHUD();
    drawControlButtons();
    drawWaveBanner();
    if(paused) drawPauseOverlay();
  }

    ctx.fillText(label, b.x+b.w/2, b.y+b.h/2);

  function plantInfoLines(p){
    const def = PLANTS[p.type];
    const lines = ["血量 "+Math.round(Math.max(0,p.hp))+"/"+Math.round(p.maxHp)];
    if(p.kind==="shooter" || p.kind==="shooter3"){
      const interval = def.rate / rowAttackMult(p.r);
      const shots = def.shots||1;
      lines.push("攻速 "+(shots/interval).toFixed(1)+" 发/秒");
      lines.push("伤害 "+def.dmg+(def.freeze?"·冰冻":"")+(p.kind==="shooter3"?"·三连":""));
      if(def.freeze) lines.push("冰冻 "+(1.5+0.2*(p.up||0)).toFixed(1)+"s"+(p.up>0?" Lv"+p.up:""));
    } else if(p.kind==="producer"){
      const val = (p.up>=7)?250:Math.round(25*(1+0.4*p.up));
      lines.push("产阳光 "+val+"/7秒 (≈"+(val/7).toFixed(1)+"/s)");
      if(p.up>0) lines.push(upgradeLabel(p));
    } else if(p.kind==="defense"){
      if(p.type==="potatoshield" && p.up>0) lines.push("护甲 Lv"+p.up+" (+"+(p.up*50)+"%血)");
      else lines.push("肉盾");
    } else if(p.kind==="torch"){ lines.push("豌豆穿过 +30%·火焰溅射");
    } else if(p.kind==="bomb"){ lines.push("范围秒杀");
    } else if(p.kind==="rowbomb"){ lines.push("烧光一整行");
    } else if(p.kind==="mine"){ lines.push(p.armed?"已激活·炸一只":"激活中…"); }
    return lines;
  }
  function drawPlantInfo(){
    if(!showInfo) return;
    ctx.save();
    ctx.font="10px 'PingFang SC',Arial"; ctx.textBaseline="top";
    for(const p of plants){
      const lines = plantInfoLines(p);
      let w=0; for(const l of lines) w=Math.max(w, ctx.measureText(l).width);
      w+=10; const h=lines.length*12+6;
      let bx=p.x-w/2, by=cellY(p.r)-h-1;
      if(by < TOPBAR_H+2) by = cellY(p.r)+GRID.ch-h-2;   // no room above -> show below
      bx = Math.max(2, Math.min(bx, W-w-2));
      ctx.fillStyle="rgba(14,18,28,.88)"; roundRect(bx,by,w,h,5); ctx.fill();
      ctx.strokeStyle="rgba(120,200,255,.45)"; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle="#e3eef8"; ctx.textAlign="left";
      lines.forEach((l,i)=> ctx.fillText(l, bx+5, by+4+i*12));
    }
    // hint
    ctx.fillStyle="rgba(255,255,255,.8)"; ctx.font="bold 12px 'PingFang SC',Arial"; ctx.textAlign="left";
    ctx.fillText("属性总览 (松开 Alt 关闭)", GRID.x, TOPBAR_H+6);
    ctx.restore();
  }

  function drawUpgradeHint(){
    if(selected||shovelMode || mouse.y<GRID.y) return;
    const c=colAtX(mouse.x), r=rowAtY(mouse.y);
    if(c<0||r<0) return;
    const sp=plants.find(p=>p.r===r&&p.c===c&&(p.type==="sunflower"||p.type==="potatoshield"||p.type==="snowpea"));
    if(!sp) return;
    const cx=cellCenterX(c), cy=cellY(r);
    let txt, ok=false;
    if(waveNum<UPGRADE_WAVE){ txt="第"+UPGRADE_WAVE+"波后可升级"; }
    else { const cost=nextUpgradeCost(sp);
      if(cost==null) txt="已满级 MAX";
      else {
        ok = sun>=cost;
        let nxt;
        if(sp.type==="potatoshield") nxt="Lv"+(sp.up+1)+"(+50%血)";
        else if(sp.type==="snowpea") nxt="Lv"+(sp.up+1)+"(冻"+(1.5+0.2*(sp.up+1)).toFixed(1)+"s)";
        else if(sp.up===0) nxt="选择分支";
        else if(sp.up<5) nxt=(sp.branch==="hp"?"血量":"攻速")+"Lv"+(sp.up+1);
        else if(sp.up===5) nxt="钢化";
        else nxt="终极";
        txt="点击升级→"+nxt+" "+cost+"阳光";
      }
    }
    ctx.save();
    ctx.font="bold 12px 'PingFang SC',Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
    const w=ctx.measureText(txt).width+18;
    ctx.fillStyle="rgba(20,20,30,.88)"; roundRect(cx-w/2, cy-20, w, 20, 6); ctx.fill();
    ctx.fillStyle = ok ? "#9be36b" : "#ffd2a0";
    ctx.fillText(txt, cx, cy-10);
    ctx.restore();
  }

  function drawTopBar(){
    ctx.fillStyle = "#6b4a2f"; ctx.fillRect(0,0,W,TOPBAR_H);
    ctx.fillStyle = "#8a6240"; ctx.fillRect(0,TOPBAR_H-6,W,6);

    ctx.save();
    roundRect(14,18,104,64,12); ctx.fillStyle="#f4e8c1"; ctx.fill();
    ctx.strokeStyle="#b89b5e"; ctx.lineWidth=3; ctx.stroke();
    drawSunIcon(40,50,15);
    ctx.fillStyle="#5a4327"; ctx.font="bold 24px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(fmtNum(sun), 86, 50);
    ctx.restore();

    CARD_ORDER.forEach((key,i)=> drawCard(key, CARD_X0 + i*CARD_STRIDE, CARD_Y));
    drawShovelButton();
  }

  function drawShovelButton(){
    const s=SHOVEL;
    ctx.save();
    roundRect(s.x,s.y,s.w,s.h,10);
    ctx.fillStyle = shovelMode ? "#ffe1b0" : "#e8d9a8"; ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle = shovelMode ? "#ff7a1e" : "#9a7c45"; ctx.stroke();
    // shovel icon
    ctx.save(); ctx.translate(s.x+s.w/2, s.y+s.h/2-2); ctx.rotate(-0.5);
    ctx.strokeStyle="#7a5a32"; ctx.lineWidth=5; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(0,8); ctx.stroke();
    ctx.strokeStyle="#5a4327"; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(-7,-18); ctx.lineTo(7,-18); ctx.stroke();
    ctx.fillStyle="#b8bcc4";
    ctx.beginPath(); ctx.moveTo(-9,8); ctx.lineTo(9,8); ctx.lineTo(7,20); ctx.quadraticCurveTo(0,26,-7,20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#8a9099"; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
    ctx.fillStyle = shovelMode?"#b5621c":"#6b5026"; ctx.font="bold 11px 'PingFang SC',Arial";
    ctx.textAlign="center"; ctx.textBaseline="bottom";

    // hotkey ~
    ctx.fillStyle="#9a7c45"; ctx.font="bold 10px Arial"; ctx.textAlign="left"; ctx.textBaseline="top";
    ctx.fillText("~", s.x+5, s.y+4);

  }

  function drawCard(key, x, y){
    const p = PLANTS[key];
    const w=CARD_W, h=CARD_H;
    const cdLeft = Math.max(0, effCooldown(key) - (gameTime - lastCardUse[key]));
    ctx.save();
    roundRect(x,y,w,h,10);
    ctx.fillStyle = selected===key ? "#fff7d6" : "#e8d9a8"; ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle = selected===key ? "#ff9d2e" : "#9a7c45"; ctx.stroke();

    // name
    ctx.fillStyle="#4a3a1c"; ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.font="bold 13px 'PingFang SC',Arial";
    ctx.fillText(p.name, x+w/2, y+6);

    // icon
    ctx.save();
    ctx.translate(x+w/2, y+38); ctx.scale(.42,.42);
    drawPlantArt(key, 0, 0, 0, 0, 1, true);
    ctx.restore();

    // cost
    drawSunIcon(x+w/2-14, y+h-12, 7);
    ctx.fillStyle="#3a2e14"; ctx.font="bold 14px Arial"; ctx.textAlign="left"; ctx.textBaseline="middle";
    ctx.fillText(p.cost, x+w/2-3, y+h-11);

    // hotkey label
    ctx.fillStyle="#9a7c45"; ctx.font="bold 10px Arial"; ctx.textAlign="left"; ctx.textBaseline="top";
    ctx.fillText(HOTKEY_LABEL[CARD_ORDER.indexOf(key)]||"", x+5, y+4);

    if(cardLocked(key)){
      // 未解锁：整张变暗 + 锁 + 解锁波数
      ctx.fillStyle="rgba(15,15,25,.74)"; roundRect(x,y,w,h,10); ctx.fill();
      ctx.fillStyle="#ffd23f"; ctx.font="bold 14px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("🔒", x+w/2, y+h/2-6);
      ctx.fillStyle="#fff"; ctx.font="bold 11px 'PingFang SC',Arial";
      ctx.fillText(p.unlock+"波解锁", x+w/2, y+h/2+12);
    } else if(cdLeft>0){
      const frac = cdLeft/p.cooldown;
      ctx.fillStyle="rgba(20,20,30,.55)"; roundRect(x,y,w,h*frac,10); ctx.fill();
    } else if(sun<p.cost){
      ctx.fillStyle="rgba(20,20,30,.4)"; roundRect(x,y,w,h,10); ctx.fill();
    }
    ctx.restore();
  }

  function drawMowers(){
    for(const m of mowers){
      if(m.used && !m.active) continue; // consumed and off-screen: don't draw
      ctx.save(); ctx.translate(m.x, m.y);
      ctx.scale(-1, 1); // face right (the direction it charges toward the zombies)
      const spin = m.active ? m.t*30 : 0;
      // wheels
      ctx.fillStyle="#2c2c2c";
      ctx.beginPath(); ctx.arc(-9,12,7,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(9,12,7,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#777"; ctx.lineWidth=1.5;
      [-9,9].forEach(wx=>{ ctx.save(); ctx.translate(wx,12); ctx.rotate(spin);
        ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(5,0); ctx.moveTo(0,-5); ctx.lineTo(0,5); ctx.stroke(); ctx.restore(); });
      // body
      ctx.fillStyle="#3fae3f"; roundRect(-14,-6,28,16,4); ctx.fill();
      ctx.fillStyle="#2e8b2e"; roundRect(-14,4,28,5,2); ctx.fill();
      // front cutter housing
      ctx.fillStyle="#d23f3f"; roundRect(-22,-2,12,14,3); ctx.fill();
      ctx.fillStyle="#b22"; ctx.beginPath(); ctx.arc(-16,5,5,0,Math.PI*2); ctx.fill();
      // blade flash when active
      if(m.active){
        ctx.strokeStyle="#fff"; ctx.lineWidth=2;
        ctx.save(); ctx.translate(-16,5); ctx.rotate(spin);
        for(let i=0;i<4;i++){ ctx.rotate(Math.PI/2); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(5,0); ctx.stroke(); }
        ctx.restore();
      }
      // handle
      ctx.strokeStyle="#555"; ctx.lineWidth=3; ctx.lineCap="round";
      ctx.beginPath(); ctx.moveTo(12,-4); ctx.lineTo(20,-16); ctx.lineTo(14,-16); ctx.stroke();
      ctx.restore();
    }
  }

  function drawHelmetShape(type){
    // drawn centered at origin (helmet only, no head)
    if(type==="cone"){
      ctx.fillStyle="#e08a2e"; ctx.beginPath(); ctx.moveTo(-13,13); ctx.lineTo(13,13); ctx.lineTo(0,-15); ctx.closePath(); ctx.fill();
      ctx.strokeStyle="#b96d1c"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-8,5); ctx.lineTo(8,5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-4,-3); ctx.lineTo(4,-3); ctx.stroke();
    } else if(type==="bucket"){
      ctx.fillStyle="#b8bcc4"; roundRect(-15,-12,30,24,4); ctx.fill();
      ctx.fillStyle="#9aa0aa"; roundRect(-15,8,30,5,2); ctx.fill();
      ctx.fillStyle="#d6dade"; roundRect(-12,-9,5,18,2); ctx.fill();
    } else if(type==="ironclad"){
      ctx.fillStyle="#9aa0aa"; ctx.beginPath(); ctx.arc(0,0,15,Math.PI,0); ctx.fill();
      ctx.fillStyle="#7e848c"; roundRect(-16,-2,32,12,3); ctx.fill();
      ctx.fillStyle="#2a2e33"; roundRect(-12,2,24,4,2); ctx.fill();
      ctx.fillStyle="#c0392b"; ctx.beginPath(); ctx.moveTo(0,-15); ctx.quadraticCurveTo(8,-26,3,-30); ctx.quadraticCurveTo(1,-20,-2,-15); ctx.closePath(); ctx.fill();
    } else if(type==="football"){
      ctx.fillStyle="#7a2b2b"; ctx.beginPath(); ctx.arc(0,0,15,Math.PI,0); ctx.fill();
      ctx.fillStyle="#a83b3b"; ctx.beginPath(); ctx.arc(0,0,15,Math.PI,1.3*Math.PI); ctx.fill();
      ctx.fillStyle="#fff"; ctx.fillRect(-2,-15,4,9);
      ctx.strokeStyle="#dcdcdc"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-14,4); ctx.lineTo(14,4); ctx.stroke();
    }
  }
  function drawDebris(){
    for(const d of debris){
      ctx.save();
      ctx.globalAlpha = d.t > d.life-1 ? Math.max(0, d.life-d.t) : 1;   // fade out last 1s
      // ground shadow when landed
      if(d.landed){ ctx.fillStyle="rgba(0,0,0,.18)"; ctx.beginPath(); ctx.ellipse(d.x, d.groundY+8, 16, 4, 0, 0, Math.PI*2); ctx.fill(); }
      ctx.translate(d.x, d.y); ctx.rotate(d.rot);
      drawHelmetShape(d.type);
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }

  function drawBeams(){
    for(const b of beams){
      const a = 1 - b.t/b.life;
      const cy = cellCenterY(b.r);
      ctx.save();
      ctx.globalAlpha = a;
      // 能量极光: 横贯整行的发光光束(从Boss向左)
      const g = ctx.createLinearGradient(GRID.x, cy, b.x, cy);
      g.addColorStop(0, "rgba(180,120,255,0)");
      g.addColorStop(0.5, "rgba(150,90,255,0.85)");
      g.addColorStop(1, "rgba(220,180,255,0.95)");
      ctx.fillStyle = g;
      const h = 22 + Math.sin(b.t*40)*4;
      ctx.fillRect(GRID.x-4, cy-h/2, b.x-GRID.x, h);
      ctx.fillStyle="rgba(255,255,255,"+(a*0.7)+")"; ctx.fillRect(GRID.x-4, cy-3, b.x-GRID.x, 6);
      ctx.restore();
    }
  }
  function drawShields(){
    for(let r=0;r<ROWS;r++){
      if(rowShield[r]>0){
        const cy=cellY(r), pulse=0.5+0.5*Math.sin(performance.now()/120);
        ctx.save();
        ctx.fillStyle="rgba(120,200,255,"+(0.12+0.08*pulse)+")";
        ctx.fillRect(GRID.x, cy, COLS*GRID.cw, GRID.ch);
        ctx.strokeStyle="rgba(150,220,255,"+(0.5+0.3*pulse)+")"; ctx.lineWidth=3;
        ctx.strokeRect(GRID.x+1, cy+1, COLS*GRID.cw-2, GRID.ch-2);
        ctx.fillStyle="rgba(200,235,255,.9)"; ctx.font="bold 14px 'PingFang SC',Arial"; ctx.textAlign="left"; ctx.textBaseline="middle";
        ctx.fillText("🛡 无敌", GRID.x+6, cy+12);
        ctx.restore();
      }
    }
  }
  function drawMashes(){
    for(const m of mashes){
      const a = Math.min(1, (m.life-m.t)/1.5);           // fade out near end
      const cy = cellCenterY(m.r)+18;
      ctx.save(); ctx.globalAlpha = 0.75*a;
      ctx.fillStyle="#c2a25a"; ctx.beginPath(); ctx.ellipse(m.x, cy, m.w*0.46, 16, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle="#a8853f"; ctx.beginPath(); ctx.ellipse(m.x-6, cy+2, m.w*0.30, 9, 0, 0, Math.PI*2); ctx.fill();
      // bubbles
      ctx.fillStyle="#d8bd7a";
      for(let i=0;i<4;i++){ const bx=m.x-18+i*12, by=cy-3+Math.sin(m.t*4+i)*2; ctx.beginPath(); ctx.arc(bx,by,2.2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
  }

  function drawLawn(){
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      ctx.fillStyle = (r+c)%2===0 ? "#a4d84a" : "#8ecb3c";
      ctx.fillRect(cellX(c), cellY(r), GRID.cw, GRID.ch);
    }
    if((selected||shovelMode) && mouse.y>GRID.y){
      const c=colAtX(mouse.x), r=rowAtY(mouse.y);
      if(c>=0&&r>=0){
        ctx.fillStyle = shovelMode ? "rgba(255,120,40,.25)" : "rgba(255,255,255,.25)";
        ctx.fillRect(cellX(c),cellY(r),GRID.cw,GRID.ch);
      }
    }
  }

  // ---- generic plant art dispatcher ----
  function drawPlantArt(type, x, y, t, recoil, hpFrac, iconMode){
    if(type==="sunflower") drawSunflowerArt(x,y,t);
    else if(type==="peashooter") drawPeashooterArt(x,y,t,recoil,"#6cc24a");
    else if(type==="snowpea") drawPeashooterArt(x,y,t,recoil,"#7fcfee");
    else if(type==="repeater") drawRepeaterArt(x,y,t,recoil);
    else if(type==="threepeater") drawThreepeaterArt(x,y,t,recoil);
    else if(type==="cactus") drawCactusArt(x,y,t,recoil,false);
    else if(type==="bigcactus") drawCactusArt(x,y,t,recoil,true);
    else if(type==="jalapeno") drawJalapenoArt(x,y,t);
    else if(type==="campfire") drawCampfireArt(x,y,t);
    else if(type==="wallnut") drawWallnutArt(x,y,hpFrac==null?1:hpFrac);
    else if(type==="potatoshield") drawPotatoShieldArt(x,y,hpFrac==null?1:hpFrac,0);
    else if(type==="cherrybomb") drawCherryArt(x,y,t);
    else if(type==="potatomine") drawMineArt(x,y,iconMode?true:undefined);
  }

  function drawPlant(p){
    ctx.save();
    ctx.translate(p.x, p.y);
    const bob = Math.sin(p.t*2 + p.c)*2;
    ctx.translate(0, bob);
    if((p.type==="cherrybomb"||p.type==="jalapeno") && p.fuse<0.5){ const s=1+(0.5-p.fuse)*0.6; ctx.scale(s,s); }
    if(p.type==="potatomine") drawMineArt(0,0,false,p.armed);
    else if(p.type==="sunflower") drawSunflowerArt(0,0,p.t,p.up,p.branch);
    else if(p.type==="potatoshield") drawPotatoShieldArt(0,0,p.hp/p.maxHp,p.up);
    else drawPlantArt(p.type, 0,0, p.t, p.recoil||0, p.hp/p.maxHp, false);
    ctx.restore();
    if(p.kind!=="bomb") drawHealthBar(p.x, p.y+40, p.hp/p.maxHp, 40);
  }

  // ---------- individual plant arts ----------
  function drawSunIcon(x,y,r){
    ctx.save(); ctx.translate(x,y);
    ctx.fillStyle="#ffcf33"; ctx.beginPath();
    for(let i=0;i<12;i++){ const a=i/12*Math.PI*2; const rr=i%2?r*1.45:r; ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr); }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#ffe680"; ctx.beginPath(); ctx.arc(0,0,r*0.78,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  const SF_ATK = ["#ffd23f","#ffc02e","#ffa61e","#ff8a1e","#ff6a1e","#ff4a2a"];   // 攻速分支 橙红
  const SF_HP  = ["#ffd23f","#bcd2e8","#9fc0e0","#82add6","#6f9fd0","#5b90c8"];   // 血量分支 蓝
  function drawSunflowerArt(x,y,t,up,branch){
    up = up||0;
    ctx.save(); ctx.translate(x,y);
    const pulse = 0.5+0.5*Math.sin(t*5);
    // ---- aura rings (behind the flower) ----
    if(up>=7){ ctx.fillStyle="rgba(255,215,0,"+(0.16+0.12*pulse).toFixed(3)+")"; ctx.beginPath(); ctx.arc(0,-12,32+3*pulse,0,Math.PI*2); ctx.fill(); }
    if(up>=6 || (branch==="hp"&&up>=1)){ ctx.strokeStyle="rgba(120,205,120,"+(0.45+0.3*pulse).toFixed(3)+")"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,-12,28,0,Math.PI*2); ctx.stroke(); }
    if(branch==="atk"&&up>=1){ ctx.strokeStyle="rgba(90,200,255,"+(0.4+0.35*pulse).toFixed(3)+")"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,-12,24,0,Math.PI*2); ctx.stroke(); }
    // stem + leaves
    ctx.strokeStyle="#4a9e2f"; ctx.lineWidth=7; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(0,34); ctx.lineTo(0,6); ctx.stroke();
    ctx.fillStyle="#5cb85c";
    ctx.beginPath(); ctx.ellipse(-14,24,12,6,-0.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(14,28,12,6,0.6,0,Math.PI*2); ctx.fill();
    // petals (color shifts with tier/branch)
    let petal;
    if(up>=7) petal="#ffd700";
    else if(up>=6) petal="#a6bcd2";
    else petal = (branch==="hp"?SF_HP:SF_ATK)[Math.min(up,5)];
    ctx.save(); ctx.translate(0,-12); ctx.rotate(Math.sin(t*2)*0.08);
    ctx.fillStyle=petal;
    for(let i=0;i<12;i++){ ctx.save(); ctx.rotate(i/12*Math.PI*2);
      ctx.beginPath(); ctx.ellipse(0,-22,7,13,0,0,Math.PI*2); ctx.fill(); ctx.restore(); }
    ctx.fillStyle = up>=6 ? "#7a5028" : "#a9742a"; ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = up>=7 ? "#e0a93a" : (up>=6 ? "#9c7a4a" : "#c98c34"); ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#3a2a14";
    ctx.beginPath(); ctx.arc(-5,-2,2.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-2,2.4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="#3a2a14"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,3,5,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.restore();
    // 钢化/终极保留流派标识：分支色虚线环 + 角标徽章
    if(up>=6 && branch){
      const bcol = branch==="atk" ? "#5ac8ff" : "#5fd07a";
      ctx.save();
      ctx.strokeStyle=bcol; ctx.lineWidth=2.4; ctx.setLineDash&&ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.arc(0,-12,21,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash&&ctx.setLineDash([]);
      // 流派角标(右上): ⚡攻速 / 🛡血量
      ctx.translate(15,-26);
      ctx.fillStyle=bcol; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#10212e"; ctx.font="bold 9px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(branch==="atk"?"⚡":"盾", 0, 1);
      ctx.restore();
    }
    // level badge
    if(up>0){
      const suffix = (up>=6 && branch) ? (branch==="atk"?"·攻速":"·血量") : "";
      const lbl = up>=7?("终极"+suffix):(up>=6?("钢化"+suffix):((branch==="hp"?"血":"攻")+"Lv"+up));
      ctx.font="bold 10px 'PingFang SC',Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
      const bw=ctx.measureText(lbl).width+10;
      ctx.fillStyle="rgba(0,0,0,.62)"; roundRect(-bw/2,-48,bw,13,5); ctx.fill();
      ctx.fillStyle = up>=6 ? (branch==="atk"?"#9fe4ff":"#a7ecb8") : (branch==="hp"?"#bfe0ff":"#ffd2a0");
      ctx.fillText(lbl, 0, -41);
    }
    ctx.restore();
  }

  function peaHead(headColor){
    ctx.fillStyle=headColor; ctx.beginPath(); ctx.arc(0,0,19,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.18)"; ctx.beginPath(); ctx.arc(-4,-4,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#3f8e2a"; ctx.beginPath(); ctx.ellipse(20,-2,9,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#2e6b1c"; ctx.beginPath(); ctx.arc(26,-2,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#1f3a14"; ctx.beginPath(); ctx.arc(-2,-4,3,0,Math.PI*2); ctx.fill();
  }
  function drawPeashooterArt(x,y,t,recoil,headColor){
    ctx.save(); ctx.translate(x,y);
    ctx.strokeStyle="#3f8e2a"; ctx.lineWidth=8; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(0,36); ctx.lineTo(0,2); ctx.stroke();
    ctx.fillStyle="#4a9e2f"; ctx.beginPath(); ctx.ellipse(-13,26,11,5,-0.6,0,Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(recoil>0?-6:0,-8); peaHead(headColor);
    if(headColor==="#7fcfee"){ // snow sparkle
      ctx.strokeStyle="#fff"; ctx.lineWidth=1.6;
      for(let i=0;i<3;i++){ ctx.save(); ctx.translate(-4,-3); ctx.rotate(i*Math.PI/3);
        ctx.beginPath(); ctx.moveTo(-4,0); ctx.lineTo(4,0); ctx.stroke(); ctx.restore(); }
    }

  function drawRepeaterArt(x,y,t,recoil){
    ctx.save(); ctx.translate(x,y);
    // stem
    ctx.strokeStyle="#3f8e2a"; ctx.lineWidth=8; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(-6,38); ctx.lineTo(-6,8); ctx.stroke();
    ctx.fillStyle="#4a9e2f"; ctx.beginPath(); ctx.ellipse(-18,28,11,5,-0.6,0,Math.PI*2); ctx.fill();

    // ----- BACK head (upper-left, slightly smaller) -----

    ctx.strokeStyle="#3f8e2a"; ctx.lineWidth=7; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(-12,-14); ctx.lineTo(4,-2); ctx.stroke();

    ctx.save(); ctx.translate(6+rx, -2); peaHead("#6cc24a"); ctx.restore();

  function drawThreepeaterArt(x,y,t,recoil){
    ctx.save(); ctx.translate(x,y);
    // thick stalk
    ctx.strokeStyle="#3f8e2a"; ctx.lineWidth=9; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(-8,38); ctx.lineTo(-8,6); ctx.stroke();
    ctx.fillStyle="#4a9e2f"; ctx.beginPath(); ctx.ellipse(-20,28,11,5,-0.6,0,Math.PI*2); ctx.fill();
    const rx = recoil>0?-4:0;
    // three stacked heads, all aiming forward (单行三连发)
    const heads=[{dx:2,dy:-16},{dx:5,dy:-1},{dx:2,dy:14}];
    ctx.strokeStyle="#3f8e2a"; ctx.lineWidth=6;
    for(const h of heads){ ctx.beginPath(); ctx.moveTo(-8,2); ctx.lineTo(h.dx-4,h.dy); ctx.stroke(); }
    for(const h of heads){ ctx.save(); ctx.translate(h.dx+rx,h.dy); ctx.scale(0.82,0.82); peaHead("#5cb83c"); ctx.restore(); }
    ctx.restore();
  }
  function drawCactusArt(x,y,t,recoil,big){
    ctx.save(); ctx.translate(x,y);
    if(big){ ctx.scale(1.18,1.18); }
    const colMain = big?"#3f7e33":"#4e9e3a", colLit = big?"#52a345":"#5fb84a";
    const rx = recoil>0?-3:0;
    // pot
    ctx.fillStyle="#c1703a"; roundRect(-12,26,24,12,3); ctx.fill();
    ctx.fillStyle="#a85d2e"; ctx.fillRect(-12,26,24,3);
    // main column
    ctx.fillStyle=colMain; roundRect(-9+rx,-22,18,50,9); ctx.fill();
    ctx.fillStyle=colLit; roundRect(-7+rx,-20,7,46,4); ctx.fill();
    // giant cactus: a flower on top
    if(big){
      ctx.fillStyle="#ff6f9c"; for(let i=0;i<6;i++){ ctx.save(); ctx.translate(0,-24); ctx.rotate(i/6*Math.PI*2); ctx.beginPath(); ctx.ellipse(0,-5,2.6,5,0,0,Math.PI*2); ctx.fill(); ctx.restore(); }
      ctx.fillStyle="#ffd23f"; ctx.beginPath(); ctx.arc(0,-24,2.6,0,Math.PI*2); ctx.fill();
    }
    // arms (L 形: 横段 + 竖段)
    ctx.fillStyle=colMain;
    roundRect(-22+rx,-4,13,6,3); ctx.fill();  roundRect(-22+rx,-18,6,18,3); ctx.fill();   // 左臂
    roundRect(12+rx,-8,12,6,3); ctx.fill();   roundRect(18+rx,-20,6,18,3); ctx.fill();    // 右臂
    // spikes
    ctx.strokeStyle="#2f6b22"; ctx.lineWidth=1.4;
    for(let i=-1;i<5;i++){ const yy=-18+i*8; ctx.beginPath(); ctx.moveTo(-9+rx,yy); ctx.lineTo(-13+rx,yy-2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(9+rx,yy); ctx.lineTo(13+rx,yy-2); ctx.stroke(); }
    // face + mouth (shooter)
    ctx.fillStyle="#1f3a14"; ctx.beginPath(); ctx.arc(-3+rx,-6,2.2,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(3+rx,-6,2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#2e6b1c"; ctx.beginPath(); ctx.ellipse(11+rx,0,5,4,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function drawJalapenoArt(x,y,t){
    ctx.save(); ctx.translate(x,y);
    const glow=0.5+0.5*Math.sin(t*10);
    ctx.fillStyle="rgba(255,90,30,"+(0.18+0.18*glow).toFixed(3)+")";
    ctx.beginPath(); ctx.arc(0,4,26,0,Math.PI*2); ctx.fill();
    // curved red chili body
    ctx.fillStyle="#d8312f"; ctx.beginPath();
    ctx.moveTo(-16,-14); ctx.quadraticCurveTo(20,-18,18,14);
    ctx.quadraticCurveTo(16,30,2,30); ctx.quadraticCurveTo(-18,28,-16,-14); ctx.closePath(); ctx.fill();
    ctx.fillStyle="#ff5b59"; ctx.beginPath();
    ctx.moveTo(-10,-8); ctx.quadraticCurveTo(10,-10,10,10); ctx.quadraticCurveTo(8,20,-2,20); ctx.quadraticCurveTo(-12,18,-10,-8); ctx.closePath(); ctx.fill();
    // green stem
    ctx.strokeStyle="#5a7a2a"; ctx.lineWidth=5; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(-14,-14); ctx.lineTo(-22,-26); ctx.stroke();
    ctx.fillStyle="#6fae3a"; ctx.beginPath(); ctx.ellipse(-15,-16,7,4,0.6,0,Math.PI*2); ctx.fill();
    // angry eyes
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(-2,2,3.4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(8,2,3.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#222"; ctx.beginPath(); ctx.arc(-1,3,1.6,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(9,3,1.6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function drawWallnutArt(x,y,frac){

    ctx.fillStyle="#a06f3c"; ctx.beginPath(); ctx.ellipse(0,-24,7,5,0,0,Math.PI*2); ctx.fill();
